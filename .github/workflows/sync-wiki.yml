name: Sync wiki

# Publishes the Markdown pages in wiki/ to this repository's GitHub Wiki.
#
# The wiki becomes generated output: edit pages in wiki/ in this repo, NOT in
# the wiki web UI (UI edits to synced pages will be overwritten on the next run).
#
# Prerequisite: the wiki must already be initialized once (Settings -> Features ->
# Wikis enabled, and at least one page created in the web UI) so that the
# <repo>.wiki.git repository exists. If the GITHUB_TOKEN push is rejected, enable
# Settings -> Actions -> General -> Workflow permissions -> "Read and write".

on:
  push:
    branches: [main]
    paths:
      - 'wiki/**'
      - '.github/workflows/sync-wiki.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: wiki-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Clone the wiki repository
        run: |
          git clone \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git" \
            wiki-repo

      - name: Mirror wiki/ into the wiki repository
        run: |
          # Delete existing top-level pages so renames/removals propagate,
          # then copy the current set in.
          find wiki-repo -maxdepth 1 -type f -name '*.md' -delete
          cp wiki/*.md wiki-repo/

      - name: Commit and push changes
        working-directory: wiki-repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Wiki already up to date — nothing to publish."
          else
            git commit -m "Sync wiki from ${{ github.repository }}@${{ github.sha }}"
            git push origin HEAD
          fi
